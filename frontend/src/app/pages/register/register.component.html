<div class="auth-container">
  <div class="auth-box">
    <h1 class="logo">Supernatural Watchloggger</h1>
    <h2>Create Account</h2>

    @if (errorMessage) {
      <div class="error-message">{{ errorMessage }}</div>
    }

    <div class="form-group">
      <label>Username</label>
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="Choose a username"
        class="form-input"
      />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="Enter your email"
        class="form-input"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Choose a password"
        class="form-input"
      />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input
        type="password"
        [(ngModel)]="password_confirm"
        placeholder="Confirm your password"
        class="form-input"
      />
    </div>

    <button class="btn-primary" (click)="onRegister()" [disabled]="isLoading">
      {{ isLoading ? 'Creating account...' : 'Create Account' }}
    </button>

    <p class="auth-link">
      Already have an account? <a routerLink="/login">Sign in here</a>
    </p>
  </div>
</div>
