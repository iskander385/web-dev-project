<div class="auth-container">
  <div class="auth-box">
    <h1 class="logo">Supernatural Watchlogger</h1>
    <h2>Sign In</h2>

    @if (errorMessage) {
      <div class="error-message">{{ errorMessage }}</div>
    }
    <div class="form-group">
      <label>Username</label>
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="Enter your username"
        class="form-input"
      />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Enter your password"
        class="form-input"
      />
    </div>

    <button class="btn-primary" (click)="onLogin()" [disabled]="isLoading">
      {{ isLoading ? 'Signing in...' : 'Sign In' }}
    </button>

    <p class="auth-link">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
